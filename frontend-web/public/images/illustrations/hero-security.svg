  <!-- Security booth -->
  <rect x="500" y="420" width="80" height="60" rx="6" fill="#1e293b"/>
  <rect x="510" y="430" width="30" height="25" rx="3" fill="#10b981"/>
  <circle cx="560" cy="445" r="8" fill="#10b981"/>
  
  <!-- Person at gate -->
  <circle cx="320" cy="430" r="18" fill="#f8fafc"/>
  <rect x="302" y="450" width="36" height="30" rx="4" fill="#3b82f6"/>
  
  <!-- Guard -->
  <circle cx="540" cy="420" r="15" fill="#f8fafc"/>
  <rect x="525" y="435" width="30" height="25" rx="3" fill="#10b981"/>
  
  <!-- QR Code -->
  <rect x="150" y="280" width="80" height="80" rx="8" fill="white"/>
  <rect x="160" y="290" width="15" height="15" fill="#0f172a"/>
  <rect x="180" y="290" width="10" height="10" fill="#0f172a"/>
  <rect x="195" y="290" width="15" height="15" fill="#0f172a"/>
  <rect x="160" y="310" width="10" height="10" fill="#0f172a"/>
  <rect x="180" y="310" width="10" height="10" fill="#0f172a"/>
  <rect x="200" y="310" width="10" height="10" fill="#0f172a"/>
  <rect x="160" y="325" width="15" height="15" fill="#0f172a"/>
  <rect x="180" y="330" width="10" height="10" fill="#0f172a"/>
  <rect x="195" y="325" width="15" height="15" fill="#0f172a"/>
  
  <!-- Phone -->
  <rect x="580" y="250" width="70" height="120" rx="10" fill="#1e293b"/>
  <rect x="590" y="265" width="50" height="80" rx="4" fill="#10b981"/>
  <text x="615" y="310" font-size="20" fill="white" text-anchor="middle"></text>
  
  <!-- Shield icon -->
  <path d="M650 150 L690 165 L690 200 C690 230 670 255 650 265 C630 255 610 230 610 200 L610 165 Z" fill="#10b981"/>
  <path d="M635 195 L648 208 L670 180" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Connection lines -->
  <path d="M230 320 Q280 350 320 430" stroke="#10b981" stroke-width="2" stroke-dasharray="5,5" opacity="0.6"/>
  <path d="M580 310 Q540 380 540 420" stroke="#10b981" stroke-width="2" stroke-dasharray="5,5" opacity="0.6"/>
  
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
