<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Background shapes -->
  <circle cx="400" cy="300" r="250" fill="url(#grad1)" opacity="0.1"/>
  <circle cx="600" cy="150" r="100" fill="url(#grad2)" opacity="0.1"/>
  <circle cx="200" cy="450" r="80" fill="url(#grad3)" opacity="0.1"/>
  
  <!-- Building -->
  <rect x="280" y="180" width="240" height="300" rx="8" fill="#1e293b"/>
  <rect x="300" y="200" width="50" height="40" rx="4" fill="#334155"/>
  <rect x="370" y="200" width="50" height="40" rx="4" fill="#334155"/>
  <rect x="440" y="200" width="50" height="40" rx="4" fill="#10b981"/>
  <rect x="300" y="260" width="50" height="40" rx="4" fill="#334155"/>
  <rect x="370" y="260" width="50" height="40" rx="4" fill="#10b981"/>
  <rect x="440" y="260" width="50" height="40" rx="4" fill="#334155"/>
  <rect x="300" y="320" width="50" height="40" rx="4" fill="#10b981"/>
  <rect x="370" y="320" width="50" height="40" rx="4" fill="#334155"/>
  <rect x="440" y="320" width="50" height="40" rx="4" fill="#334155"/>
  
  <!-- Gate -->
  <rect x="350" y="400" width="100" height="80" rx="4" fill="#0f172a"/>
