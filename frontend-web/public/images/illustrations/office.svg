<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" fill="#f1f5f9"/>
  
  <!-- Office building exterior -->
  <rect x="50" y="50" width="300" height="220" rx="8" fill="#1e293b"/>
  
  <!-- Glass facade -->
  <rect x="60" y="60" width="280" height="200" rx="4" fill="#0ea5e9" opacity="0.3"/>
  
  <!-- Windows grid -->
  <g fill="#0ea5e9" opacity="0.6">
    <rect x="70" y="70" width="50" height="35" rx="2"/>
    <rect x="130" y="70" width="50" height="35" rx="2"/>
    <rect x="190" y="70" width="50" height="35" rx="2"/>
    <rect x="250" y="70" width="50" height="35" rx="2"/>
    
    <rect x="70" y="115" width="50" height="35" rx="2"/>
    <rect x="130" y="115" width="50" height="35" rx="2"/>
    <rect x="190" y="115" width="50" height="35" rx="2"/>
    <rect x="250" y="115" width="50" height="35" rx="2"/>
    
    <rect x="70" y="160" width="50" height="35" rx="2"/>
    <rect x="130" y="160" width="50" height="35" rx="2"/>
    <rect x="190" y="160" width="50" height="35" rx="2"/>
    <rect x="250" y="160" width="50" height="35" rx="2"/>
  </g>
  
  <!-- Entrance -->
  <rect x="160" y="210" width="80" height="50" rx="4" fill="#0f172a"/>
  <rect x="170" y="215" width="25" height="40" rx="2" fill="#334155"/>
  <rect x="205" y="215" width="25" height="40" rx="2" fill="#334155"/>
  
  <!-- Reception desk inside -->
  <rect x="175" y="235" width="50" height="15" rx="2" fill="#10b981"/>
  
  <!-- Lobby -->
  <rect x="50" y="260" width="300" height="30" rx="4" fill="#334155"/>
  
  <!-- Company logo area -->
  <rect x="165" y="25" width="70" height="20" rx="4" fill="#10b981"/>
  <text x="200" y="40" font-size="10" fill="white" text-anchor="middle" font-weight="bold">ACME</text>
  
  <!-- Visitor with briefcase -->
  <circle cx="100" cy="240" r="15" fill="#fef3c7"/>
  <rect x="85" y="255" width="30" height="25" rx="3" fill="#3b82f6"/>
  <rect x="110" y="265" width="15" height="10" rx="2" fill="#1e293b"/>
  
  <!-- Security person -->
  <circle cx="320" cy="245" r="12" fill="#fef3c7"/>
  <rect x="308" y="257" width="24" height="20" rx="3" fill="#10b981"/>
  
  <!-- QR scanner -->
  <rect x="135" y="255" width="25" height="20" rx="3" fill="white"/>
  <rect x="140" y="260" width="15" height="10" fill="#0f172a"/>
  
  <!-- Plants -->
  <ellipse cx="65" cy="255" rx="10" ry="12" fill="#10b981"/>
  <rect x="63" y="260" width="4" height="10" fill="#92400e"/>
  
  <ellipse cx="335" cy="255" rx="10" ry="12" fill="#10b981"/>
  <rect x="333" y="260" width="4" height="10" fill="#92400e"/>
</svg>
